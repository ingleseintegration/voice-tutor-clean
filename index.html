<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor Vocale AI</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 32px;
    }

    p {
      margin-top: 0;
      color: #4b5563;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
    }

    select, button, input {
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 12px 14px;
    }

    select, input {
      background: white;
    }

    button {
      cursor: pointer;
      border: none;
      background: #111827;
      color: white;
      font-weight: 600;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    #chat {
      height: 420px;
      overflow-y: auto;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-top: 18px;
    }

    .msg {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
    }

    .assistant {
      background: #e5e7eb;
      margin-right: auto;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #6b7280;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Tutor Vocale AI</h1>
      <p>Versione iniziale browser-based fuori da Wix.</p>

      <div class="row">
        <select id="mode">
          <option value="business">Inglese per il lavoro</option>
          <option value="general">Inglese quotidiano</option>
          <option value="finance">Inglese finanziario</option>
          <option value="legal">Inglese legale</option>
        </select>

        <button id="micBtn">🎤 Parla</button>
        <button id="speakBtn" class="secondary">🔊 Voce ON</button>
        <button id="newBtn" class="secondary">Nuova conversazione</button>
      </div>

      <div class="row">
        <input id="textInput" type="text" placeholder="Scrivi qui..." style="flex:1;" />
        <button id="sendBtn">Invia</button>
      </div>

      <div id="chat">
        <div class="msg assistant">Ciao. Sono il tuo tutor di inglese AI.</div>
      </div>

      <div id="status">Pronto.</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const speakBtn = document.getElementById("speakBtn");
    const newBtn = document.getElementById("newBtn");
    const textInput = document.getElementById("textInput");
    const modeSelect = document.getElementById("mode");

    let voiceOutputEnabled = true;
    let isListening = false;

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function stopSpeaking() {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
    }

    function speakText(text) {
      if (!voiceOutputEnabled) return;
      if (!("speechSynthesis" in window)) return;
      if (!text || !text.trim()) return;

      stopSpeaking();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.98;
      utterance.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const preferredVoice =
        voices.find(v => v.lang === "en-US" && /female|samantha|zira|aria|jenny|google us english/i.test(v.name)) ||
        voices.find(v => v.lang === "en-US") ||
        voices.find(v => v.lang && v.lang.startsWith("en"));

      if (preferredVoice) {
        utterance.voice = preferredVoice;
      }

      window.speechSynthesis.speak(utterance);
    }

    function updateSpeakButton() {
      speakBtn.textContent = voiceOutputEnabled ? "🔊 Voce ON" : "🔇 Voce OFF";
    }

    async function sendMessage() {
      const text = textInput.value.trim();
      if (!text) return;

      addMessage(text, "user");
      textInput.value = "";
      sendBtn.disabled = true;
      micBtn.disabled = true;
      statusEl.textContent = "Invio in corso...";

      const loadingMsg = addMessage("Sto scrivendo...", "assistant");

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text,
            mode: modeSelect.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.reply || "Errore durante la richiesta.");
        }

        const reply = data.reply || "Nessuna risposta ricevuta.";
        loadingMsg.textContent = reply;
        statusEl.textContent = "Risposta ricevuta.";

        speakText(reply);
      } catch (error) {
        loadingMsg.textContent = "Errore: impossibile ottenere una risposta.";
        statusEl.textContent = error.message || "Errore di connessione.";
      } finally {
        sendBtn.disabled = false;
        micBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    textInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    newBtn.addEventListener("click", () => {
      stopSpeaking();
      chat.innerHTML = '<div class="msg assistant">Ciao. Sono il tuo tutor di inglese AI.</div>';
      textInput.value = "";
      statusEl.textContent = "Nuova conversazione avviata.";
    });

    speakBtn.addEventListener("click", () => {
      voiceOutputEnabled = !voiceOutputEnabled;
      updateSpeakButton();

      if (!voiceOutputEnabled) {
        stopSpeaking();
        statusEl.textContent = "Voce disattivata.";
      } else {
        statusEl.textContent = "Voce attivata.";
      }
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onstart = () => {
        isListening = true;
        stopSpeaking();
        statusEl.textContent = "Ascolto in corso...";
        micBtn.textContent = "⏹ Ferma";
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        textInput.value = transcript;
        statusEl.textContent = "Voce acquisita.";
      };

      recognition.onerror = (event) => {
        statusEl.textContent = "Errore microfono: " + event.error;
        isListening = false;
        micBtn.textContent = "🎤 Parla";
      };

      recognition.onend = () => {
        isListening = false;
        micBtn.textContent = "🎤 Parla";
        if (statusEl.textContent === "Ascolto in corso...") {
          statusEl.textContent = "Ascolto terminato.";
        }
      };

      micBtn.addEventListener("click", () => {
        if (isListening) {
          recognition.stop();
          return;
        }

        try {
          recognition.start();
        } catch (error) {
          statusEl.textContent = "Impossibile avviare il microfono.";
        }
      });
    } else {
      micBtn.addEventListener("click", () => {
        statusEl.textContent = "Speech recognition non supportato in questo browser.";
      });
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {};
      window.speechSynthesis.getVoices();
    }

    updateSpeakButton();
  </script>
</body>
</html>
