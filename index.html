<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor Vocale AI</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 32px;
    }

    p {
      margin-top: 0;
      color: #4b5563;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
      align-items: center;
    }

    select, button, input {
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 12px 14px;
    }

    select, input {
      background: white;
    }

    button {
      cursor: pointer;
      border: none;
      background: #111827;
      color: white;
      font-weight: 600;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button.danger {
      background: #b91c1c;
      color: white;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .label {
      font-size: 14px;
      color: #6b7280;
      margin-right: 2px;
    }

    #chat {
      height: 420px;
      overflow-y: auto;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      margin-top: 18px;
    }

    .msg {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .user {
      background: #dbeafe;
      margin-left: auto;
    }

    .assistant {
      background: #e5e7eb;
      margin-right: auto;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
      color: #6b7280;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Tutor Vocale AI</h1>
      <p>Versione iniziale browser-based fuori da Wix.</p>

      <div class="row">
        <select id="mode">
          <option value="business">Inglese per il lavoro</option>
          <option value="general">Inglese quotidiano</option>
          <option value="finance">Inglese finanziario</option>
          <option value="legal">Inglese legale</option>
        </select>

        <span class="label">Lingua input</span>
        <select id="inputLang">
          <option value="en-US">English</option>
          <option value="it-IT">Italiano</option>
        </select>

        <button id="micBtn">🎤 Parla</button>
        <button id="handsFreeBtn" class="secondary">🟢 Hands-free</button>
        <button id="stopLoopBtn" class="danger">⛔ Stop</button>
        <button id="speakBtn" class="secondary">🔊 Voce ON</button>
        <button id="newBtn" class="secondary">Nuova conversazione</button>
      </div>

      <div class="row">
        <input id="textInput" type="text" placeholder="Scrivi qui..." style="flex:1;" />
        <button id="sendBtn">Invia</button>
      </div>

      <div id="chat">
        <div class="msg assistant">Ciao. Sono il tuo tutor di inglese AI.</div>
      </div>

      <div id="status">Pronto.</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const handsFreeBtn = document.getElementById("handsFreeBtn");
    const stopLoopBtn = document.getElementById("stopLoopBtn");
    const speakBtn = document.getElementById("speakBtn");
    const newBtn = document.getElementById("newBtn");
    const textInput = document.getElementById("textInput");
    const modeSelect = document.getElementById("mode");
    const inputLangSelect = document.getElementById("inputLang");

    let voiceOutputEnabled = true;
    let isListening = false;
    let isSending = false;
    let handsFreeMode = false;
    let lastTranscript = "";
    let recognition = null;
    let currentUtterance = null;
    let currentAbortController = null;

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function stopSpeaking() {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      currentUtterance = null;
    }

    function pickBestVoice() {
      if (!("speechSynthesis" in window)) return null;

      const voices = window.speechSynthesis.getVoices();

      return (
        voices.find(v => /Google UK English Female/i.test(v.name)) ||
        voices.find(v => /Microsoft Sonia/i.test(v.name)) ||
        voices.find(v => /Microsoft Aria/i.test(v.name)) ||
        voices.find(v => /Microsoft Jenny/i.test(v.name)) ||
        voices.find(v => /Samantha/i.test(v.name)) ||
        voices.find(v => /Female/i.test(v.name) && /^en/i.test(v.lang)) ||
        voices.find(v => v.lang === "en-GB") ||
        voices.find(v => v.lang === "en-US") ||
        voices.find(v => /^en/i.test(v.lang)) ||
        null
      );
    }

    function updateButtons() {
      speakBtn.textContent = voiceOutputEnabled ? "🔊 Voce ON" : "🔇 Voce OFF";
      handsFreeBtn.textContent = handsFreeMode ? "🟢 Hands-free ON" : "🟢 Hands-free";
      stopLoopBtn.disabled = !handsFreeMode && !isListening && !isSending;
    }

    function applyRecognitionLanguage() {
      if (!recognition) return;
      recognition.lang = inputLangSelect.value;
    }

    function startListening() {
      if (!recognition) {
        statusEl.textContent = "Speech recognition non supportato in questo browser.";
        return;
      }

      if (isListening || isSending) return;

      applyRecognitionLanguage();

      try {
        recognition.start();
      } catch (error) {
        statusEl.textContent = "Impossibile avviare il microfono.";
      }
    }

    function stopEverything() {
      handsFreeMode = false;
      lastTranscript = "";

      if (recognition && isListening) {
        recognition.stop();
      }

      if (currentAbortController) {
        currentAbortController.abort();
        currentAbortController = null;
      }

      stopSpeaking();
      isSending = false;
      sendBtn.disabled = false;
      micBtn.disabled = false;
      handsFreeBtn.disabled = false;
      statusEl.textContent = "Conversazione fermata.";
      micBtn.textContent = "🎤 Parla";
      updateButtons();
    }

    function speakText(text) {
      return new Promise((resolve) => {
        if (!voiceOutputEnabled) {
          resolve();
          return;
        }

        if (!("speechSynthesis" in window)) {
          resolve();
          return;
        }

        if (!text || !text.trim()) {
          resolve();
          return;
        }

        stopSpeaking();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-GB";
        utterance.rate = 0.88;
        utterance.pitch = 1;
        utterance.volume = 1;

        const chosenVoice = pickBestVoice();
        if (chosenVoice) {
          utterance.voice = chosenVoice;
          utterance.lang = chosenVoice.lang || "en-GB";
        }

        utterance.onend = () => {
          currentUtterance = null;
          resolve();
        };

        utterance.onerror = () => {
          currentUtterance = null;
          resolve();
        };

        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
      });
    }

    function parseSSEChunk(chunk, onEvent) {
      const blocks = chunk.split("\n\n");

      for (const block of blocks) {
        const trimmed = block.trim();
        if (!trimmed) continue;

        const lines = trimmed.split("\n");
        const dataLines = lines
          .filter(line => line.startsWith("data:"))
          .map(line => line.slice(5).trim());

        if (!dataLines.length) continue;

        const dataText = dataLines.join("\n");
        if (!dataText || dataText === "[DONE]") continue;

        try {
          const event = JSON.parse(dataText);
          onEvent(event);
        } catch {
          // ignore malformed partial blocks
        }
      }
    }

    async function sendMessage(forcedText = null) {
      const text = forcedText !== null ? String(forcedText).trim() : textInput.value.trim();
      if (!text || isSending) return;

      isSending = true;
      updateButtons();

      addMessage(text, "user");
      textInput.value = "";
      sendBtn.disabled = true;
      micBtn.disabled = true;
      handsFreeBtn.disabled = true;
      statusEl.textContent = "Invio in corso...";

      const assistantMsg = addMessage("", "assistant");
      let fullReply = "";
      let doneReceived = false;

      currentAbortController = new AbortController();

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text,
            mode: modeSelect.value,
            stream: true
          }),
          signal: currentAbortController.signal
        });

        if (!response.ok || !response.body) {
          throw new Error("Errore durante la richiesta.");
        }

        statusEl.textContent = "Risposta in arrivo...";

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });

          const parts = buffer.split("\n\n");
          buffer = parts.pop() || "";

          for (const part of parts) {
            parseSSEChunk(part + "\n\n", (event) => {
              if (event.type === "delta" && event.text) {
                fullReply += event.text;
                assistantMsg.textContent = fullReply;
                chat.scrollTop = chat.scrollHeight;
                statusEl.textContent = "Sto rispondendo...";
              }

              if (event.type === "done") {
                fullReply = event.reply || fullReply;
                assistantMsg.textContent = fullReply;
                doneReceived = true;
                statusEl.textContent = "Risposta ricevuta.";
              }

              if (event.type === "error") {
                throw new Error(event.message || "Errore server.");
              }
            });
          }
        }

        if (buffer.trim()) {
          parseSSEChunk(buffer, (event) => {
            if (event.type === "delta" && event.text) {
              fullReply += event.text;
              assistantMsg.textContent = fullReply;
              chat.scrollTop = chat.scrollHeight;
            }

            if (event.type === "done") {
              fullReply = event.reply || fullReply;
              assistantMsg.textContent = fullReply;
              doneReceived = true;
            }
          });
        }

        fullReply = String(fullReply || "").trim();

        if (!fullReply) {
          assistantMsg.textContent = "Errore: impossibile ottenere una risposta.";
          statusEl.textContent = "Risposta vuota.";
        } else {
          if (!doneReceived) {
            statusEl.textContent = "Risposta ricevuta.";
          }
          await speakText(fullReply);
        }

        if (handsFreeMode) {
          statusEl.textContent = "Pronto ad ascoltare...";
          setTimeout(() => {
            if (handsFreeMode && !isListening && !isSending) {
              startListening();
            }
          }, 400);
        }
      } catch (error) {
        if (error.name === "AbortError") {
          assistantMsg.textContent = assistantMsg.textContent || "Operazione interrotta.";
          statusEl.textContent = "Operazione interrotta.";
        } else {
          assistantMsg.textContent = assistantMsg.textContent || "Errore: impossibile ottenere una risposta.";
          statusEl.textContent = error.message || "Errore di connessione.";
        }
      } finally {
        currentAbortController = null;
        isSending = false;
        sendBtn.disabled = false;
        micBtn.disabled = false;
        handsFreeBtn.disabled = false;
        updateButtons();
      }
    }

    sendBtn.addEventListener("click", () => sendMessage());

    textInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    newBtn.addEventListener("click", () => {
      stopSpeaking();

      if (currentAbortController) {
        currentAbortController.abort();
        currentAbortController = null;
      }

      handsFreeMode = false;
      lastTranscript = "";
      chat.innerHTML = '<div class="msg assistant">Ciao. Sono il tuo tutor di inglese AI.</div>';
      textInput.value = "";
      statusEl.textContent = "Nuova conversazione avviata.";
      updateButtons();
    });

    speakBtn.addEventListener("click", () => {
      voiceOutputEnabled = !voiceOutputEnabled;

      if (!voiceOutputEnabled) {
        stopSpeaking();
        statusEl.textContent = "Voce disattivata.";
      } else {
        statusEl.textContent = "Voce attivata.";
      }

      updateButtons();
    });

    handsFreeBtn.addEventListener("click", () => {
      handsFreeMode = !handsFreeMode;

      if (handsFreeMode) {
        statusEl.textContent = "Hands-free attivato.";
        stopSpeaking();
        setTimeout(() => {
          if (handsFreeMode) startListening();
        }, 250);
      } else {
        statusEl.textContent = "Hands-free disattivato.";
      }

      updateButtons();
    });

    stopLoopBtn.addEventListener("click", () => {
      stopEverything();
    });

    inputLangSelect.addEventListener("change", () => {
      const label = inputLangSelect.value === "it-IT" ? "Italiano" : "English";
      statusEl.textContent = `Lingua input: ${label}`;

      if (recognition && isListening) {
        recognition.stop();
      }
    });

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.interimResults = false;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;
      applyRecognitionLanguage();

      recognition.onstart = () => {
        isListening = true;
        lastTranscript = "";
        stopSpeaking();

        const langLabel = inputLangSelect.value === "it-IT" ? "Italiano" : "English";
        statusEl.textContent = handsFreeMode
          ? `Hands-free in ascolto (${langLabel})...`
          : `Ascolto in corso (${langLabel})...`;

        micBtn.textContent = "⏹ Ferma";
        updateButtons();
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.trim();
        lastTranscript = transcript;
        textInput.value = transcript;
        statusEl.textContent = handsFreeMode ? "Ricevuto. Invio automatico..." : "Voce acquisita. Invio automatico...";
      };

      recognition.onerror = (event) => {
        isListening = false;
        micBtn.textContent = "🎤 Parla";

        if (event.error === "no-speech") {
          statusEl.textContent = handsFreeMode ? "Non ho sentito nulla. Riprovo..." : "Non ho sentito nulla.";
        } else if (event.error === "aborted") {
          statusEl.textContent = "Ascolto interrotto.";
        } else {
          statusEl.textContent = "Errore microfono: " + event.error;
        }

        updateButtons();

        if (handsFreeMode && event.error === "no-speech") {
          setTimeout(() => {
            if (handsFreeMode && !isListening && !isSending) {
              startListening();
            }
          }, 700);
        }
      };

      recognition.onend = async () => {
        isListening = false;
        micBtn.textContent = "🎤 Parla";
        updateButtons();

        if (lastTranscript) {
          const textToSend = lastTranscript;
          lastTranscript = "";
          await sendMessage(textToSend);
          return;
        }

        if (handsFreeMode && !isSending) {
          setTimeout(() => {
            if (handsFreeMode && !isListening && !isSending) {
              startListening();
            }
          }, 700);
        } else if (
          statusEl.textContent.startsWith("Ascolto in corso") ||
          statusEl.textContent.startsWith("Hands-free in ascolto")
        ) {
          statusEl.textContent = "Ascolto terminato.";
        }
      };

      micBtn.addEventListener("click", () => {
        if (isListening) {
          recognition.stop();
          return;
        }

        handsFreeMode = false;
        updateButtons();
        startListening();
      });
    } else {
      micBtn.addEventListener("click", () => {
        statusEl.textContent = "Speech recognition non supportato in questo browser.";
      });

      handsFreeBtn.addEventListener("click", () => {
        handsFreeMode = false;
        updateButtons();
        statusEl.textContent = "Speech recognition non supportato in questo browser.";
      });
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
      window.speechSynthesis.getVoices();
    }

    updateButtons();
  </script>
</body>
</html>
