<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutor Vocale Premium</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f4f4f7;
      --panel: #efeff4;
      --panel-2: #ffffff;
      --border: #d8d8e3;
      --text: #0f1d63;
      --muted: #7b7f96;
      --primary-start: #4da3ff;
      --primary-end: #6a3df0;
      --danger-start: #ff7a94;
      --danger-end: #db416d;
      --assistant-bg: #ececf3;
      --user-bg: #dfe9ff;
      --shadow: 0 10px 28px rgba(48, 55, 120, 0.12);
      --soft-shadow: 0 6px 18px rgba(58, 66, 135, 0.10);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(106, 61, 240, 0.07), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 22px 42px;
    }

    .hero {
      text-align: center;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 44px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
    }

    .hero h1 .accent {
      color: #5f4cf0;
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      color: #5f4cf0;
    }

    .card {
      max-width: 1260px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid rgba(122, 127, 150, 0.18);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .section-label {
      font-size: 14px;
      color: #8d92aa;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 14px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 18px;
      align-items: start;
    }

    .control-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mode-box {
      width: 100%;
    }

    .label {
      font-size: 14px;
      color: var(--muted);
      margin-right: -2px;
    }

    select,
    button,
    input {
      font-size: 16px;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      transition: all 0.18s ease;
    }

    select,
    input {
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: #8f81f5;
      box-shadow: 0 0 0 3px rgba(106, 61, 240, 0.12);
    }

    button {
      cursor: pointer;
      border: none;
      color: white;
      font-weight: 700;
      box-shadow: var(--soft-shadow);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button,
    #sendBtn,
    #startBtn,
    #interruptBtn,
    #connectBtn,
    #disconnectBtn {
      min-height: 54px;
    }

    #mode {
      width: 100%;
      min-height: 76px;
      font-size: 18px;
      border-radius: 0;
      border: 4px solid #b8bbca;
      background: #ffffff;
      padding: 18px 20px;
    }

    #inputLang {
      min-width: 126px;
    }

    #connectBtn,
    #startBtn,
    #sendBtn {
      background: linear-gradient(90deg, var(--primary-start), var(--primary-end));
    }

    #interruptBtn,
    #disconnectBtn {
      background: linear-gradient(90deg, var(--danger-start), var(--danger-end));
    }

    .composer {
      margin-top: 18px;
    }

    .composer-label {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 10px 238px;
    }

    .composer-row {
      display: grid;
      grid-template-columns: 1fr 130px;
      gap: 14px;
      align-items: center;
    }

    #textInput {
      width: 100%;
      min-height: 88px;
      font-size: 17px;
      border-radius: 14px;
      box-shadow: var(--soft-shadow);
    }

    #chat {
      height: 360px;
      overflow-y: auto;
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(140, 145, 168, 0.24);
      border-radius: 24px;
      padding: 20px;
      margin-top: 22px;
    }

    .msg {
      max-width: 82%;
      padding: 18px 20px;
      border-radius: 18px;
      margin-bottom: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      font-size: 16px;
      box-shadow: 0 4px 12px rgba(85, 92, 150, 0.06);
    }

    .user {
      background: var(--user-bg);
      color: #233b79;
      margin-left: auto;
      border-bottom-right-radius: 8px;
    }

    .assistant {
      background: var(--assistant-bg);
      color: #2c3559;
      margin-right: auto;
      border-bottom-left-radius: 8px;
    }

    .system {
      background: #fff7da;
      color: #6a5500;
      margin-right: auto;
      border-bottom-left-radius: 8px;
    }

    #status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
      min-height: 20px;
    }

    @media (max-width: 980px) {
      .top-grid {
        grid-template-columns: 1fr;
      }

      .composer-label {
        margin-left: 0;
      }

      .composer-row {
        grid-template-columns: 1fr;
      }

      #sendBtn {
        width: 100%;
      }

      .msg {
        max-width: 92%;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 18px 14px 28px;
      }

      .hero h1 {
        font-size: 34px;
      }

      .hero p {
        font-size: 14px;
      }

      .card {
        padding: 18px;
        border-radius: 20px;
      }

      .row {
        gap: 10px;
      }

      #inputLang,
      #connectBtn,
      #disconnectBtn,
      #startBtn,
      #interruptBtn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Inglese <span class="accent">Integration</span></h1>
      <p>Tutor vocale premium sperimentale</p>
    </div>

    <div class="card">
      <div class="section-label">Realtime voice prototype</div>

      <div class="top-grid">
        <div class="mode-box">
          <select id="mode">
            <option value="business">Inglese per il lavoro</option>
            <option value="general">Inglese quotidiano</option>
            <option value="finance">Inglese finanziario</option>
            <option value="legal">Inglese legale</option>
          </select>
        </div>

        <div class="control-stack">
          <div class="row">
            <span class="label">Lingua input</span>
            <select id="inputLang">
              <option value="en-US">English</option>
              <option value="it-IT">Italiano</option>
            </select>

            <button id="connectBtn">Connetti</button>
            <button id="disconnectBtn" disabled>Disconnetti</button>
            <button id="startBtn" disabled>🎤 Parla</button>
            <button id="interruptBtn" disabled>⛔ Interrompi</button>
          </div>
        </div>
      </div>

      <div class="composer">
        <div class="composer-label">Scrivi un messaggio oppure usa la voce</div>
        <div class="composer-row">
          <input id="textInput" type="text" placeholder="Esempio: correggi questa frase in inglese" />
          <button id="sendBtn" disabled>INVIA</button>
        </div>
      </div>

      <div id="chat">
        <div class="msg system">Prototipo premium pronto da collegare.</div>
      </div>

      <div id="status">Non connesso.</div>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const statusEl = document.getElementById("status");
    const connectBtn = document.getElementById("connectBtn");
    const disconnectBtn = document.getElementById("disconnectBtn");
    const startBtn = document.getElementById("startBtn");
    const interruptBtn = document.getElementById("interruptBtn");
    const sendBtn = document.getElementById("sendBtn");
    const textInput = document.getElementById("textInput");
    const modeSelect = document.getElementById("mode");
    const inputLangSelect = document.getElementById("inputLang");

    let pc = null;
    let dc = null;
    let localStream = null;
    let remoteAudio = null;
    let isConnected = false;
    let isRecording = false;

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function updateButtons() {
      connectBtn.disabled = isConnected;
      disconnectBtn.disabled = !isConnected;
      startBtn.disabled = !isConnected;
      interruptBtn.disabled = !isConnected;
      sendBtn.disabled = !isConnected;
      startBtn.textContent = isRecording ? "🎤 Microfono attivo" : "🎤 Parla";
    }

    async function connectRealtime() {
      if (isConnected) return;

      try {
        statusEl.textContent = "Creo sessione realtime...";

        const tokenResponse = await fetch("/api/realtime-session", {
          method: "POST"
        });

        const sessionData = await tokenResponse.json();

        if (!tokenResponse.ok) {
          throw new Error(sessionData.error || "Errore creazione sessione.");
        }

        const ephemeralKey =
          sessionData.client_secret &&
          sessionData.client_secret.value;

        if (!ephemeralKey) {
          throw new Error("Chiave realtime mancante.");
        }

        statusEl.textContent = "Accesso al microfono...";

        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true
        });

        remoteAudio = document.createElement("audio");
        remoteAudio.autoplay = true;

        pc = new RTCPeerConnection();

        localStream.getTracks().forEach(track => {
          pc.addTrack(track, localStream);
        });

        pc.ontrack = (event) => {
          remoteAudio.srcObject = event.streams[0];
        };

        dc = pc.createDataChannel("oai-events");

        dc.onopen = () => {
          statusEl.textContent = "Connesso. Puoi parlare.";
          isConnected = true;
          updateButtons();
          sendSessionUpdate();
          addMessage("Connessione premium attiva.", "system");
        };

        dc.onmessage = (event) => {
          handleRealtimeEvent(event);
        };

        dc.onclose = () => {
          statusEl.textContent = "Canale realtime chiuso.";
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const baseUrl = "https://api.openai.com/v1/realtime";
        const model = "gpt-realtime-mini";
        const sdpResponse = await fetch(`${baseUrl}?model=${model}`, {
          method: "POST",
          body: offer.sdp,
          headers: {
            Authorization: `Bearer ${ephemeralKey}`,
            "Content-Type": "application/sdp"
          }
        });

        if (!sdpResponse.ok) {
          const errorText = await sdpResponse.text();
          throw new Error(errorText || "Errore handshake realtime.");
        }

        const answer = {
          type: "answer",
          sdp: await sdpResponse.text()
        };

        await pc.setRemoteDescription(answer);
      } catch (error) {
        console.error(error);
        statusEl.textContent = error.message || "Errore di connessione.";
        addMessage(error.message || "Errore di connessione.", "system");
        disconnectRealtime();
      }
    }

    function sendSessionUpdate() {
      if (!dc || dc.readyState !== "open") return;

      const mode = modeSelect.value;
      const inputLang = inputLangSelect.value === "it-IT" ? "Italian" : "English";

      let focusLine = "Focus on everyday English.";
      if (mode === "business") focusLine = "Focus on business English.";
      if (mode === "finance") focusLine = "Focus on financial English.";
      if (mode === "legal") focusLine = "Focus on legal English.";

      dc.send(JSON.stringify({
        type: "session.update",
        session: {
          modalities: ["audio", "text"],
          instructions:
            "You are a voice-first English tutor for Italian users. " +
            "Be natural, concise, supportive, and easy to understand. " +
            "Let the user interrupt naturally. " +
            "If the user speaks in Italian, help them say it in natural English. " +
            "If the user uses incorrect English, correct it briefly and give the best spoken version. " +
            "Reply mainly in English with very short Italian clarification only if useful. " +
            `${focusLine} ` +
            `The current input language is ${inputLang}.`,
          turn_detection: {
            type: "server_vad"
          }
        }
      }));
    }

    function handleRealtimeEvent(event) {
      try {
        const data = JSON.parse(event.data);

        if (data.type === "response.audio_transcript.done" && data.transcript) {
          addMessage(data.transcript, "assistant");
        }

        if (data.type === "conversation.item.input_audio_transcription.completed" && data.transcript) {
          addMessage(data.transcript, "user");
        }

        if (data.type === "response.done") {
          statusEl.textContent = "Risposta completata.";
        }
      } catch (error) {
        console.error("Errore evento realtime:", error);
      }
    }

    function sendTextMessage() {
      const text = textInput.value.trim();
      if (!text || !dc || dc.readyState !== "open") return;

      dc.send(JSON.stringify({
        type: "conversation.item.create",
        item: {
          type: "message",
          role: "user",
          content: [
            {
              type: "input_text",
              text
            }
          ]
        }
      }));

      dc.send(JSON.stringify({
        type: "response.create"
      }));

      addMessage(text, "user");
      textInput.value = "";
      statusEl.textContent = "Messaggio inviato.";
    }

    function interruptAssistant() {
      if (!dc || dc.readyState !== "open") return;

      dc.send(JSON.stringify({
        type: "response.cancel"
      }));

      statusEl.textContent = "Risposta interrotta.";
    }

    function disconnectRealtime() {
      isConnected = false;
      isRecording = false;

      if (dc) {
        try { dc.close(); } catch {}
        dc = null;
      }

      if (pc) {
        try { pc.close(); } catch {}
        pc = null;
      }

      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }

      if (remoteAudio) {
        remoteAudio.srcObject = null;
        remoteAudio = null;
      }

      statusEl.textContent = "Disconnesso.";
      updateButtons();
    }

    connectBtn.addEventListener("click", connectRealtime);
    disconnectBtn.addEventListener("click", disconnectRealtime);

    startBtn.addEventListener("click", async () => {
      if (!localStream) return;

      const audioTrack = localStream.getAudioTracks()[0];
      if (!audioTrack) return;

      audioTrack.enabled = true;
      isRecording = true;
      statusEl.textContent = "Microfono attivo. Parla liberamente.";
      updateButtons();
    });

    interruptBtn.addEventListener("click", interruptAssistant);

    sendBtn.addEventListener("click", sendTextMessage);

    textInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        sendTextMessage();
      }
    });

    modeSelect.addEventListener("change", sendSessionUpdate);
    inputLangSelect.addEventListener("change", sendSessionUpdate);

    updateButtons();
  </script>
</body>
</html>
